<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Consumo - Nobel School</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/darkmode.js"></script>
</head>

<body class="bg-admin" data-tipo="administrativos">

  <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand d-inline-flex align-items-center" href="index.html">
        <img src="logo.png" alt="Logo Nobel School" height="40" class="me-2 rounded bg-white p-1">
        Nobel School
      </a>
      <a href="index.html" class="btn btn-outline-light"><i class="bi bi-house-door-fill me-1"></i> Inicio</a>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="text-center text-success mb-4 fw-bold"><i class="bi bi-person-badge"></i> Personal Administrativo</h2>

    <div class="row mb-4 align-items-center">
      <div class="col-md-6 mb-3 mb-md-0">
        <div class="input-group shadow-sm">
          <input type="text" id="nuevoNombre" class="form-control border-success" placeholder="Nombre completo...">
          <button id="btnAgregar" class="btn btn-success fw-bold">➕ Añadir</button>
        </div>
      </div>
      <div class="col-md-6">
        <div class="input-group shadow-sm">
          <span class="input-group-text bg-white text-muted border-end-0">
            <i class="bi bi-search"></i>
          </span>
          <input type="text" id="buscadorNombres" class="form-control border-start-0"
            placeholder="Buscar administrativo por nombre...">
        </div>
      </div>
    </div>

    <div id="listaPersonas" class="row g-3"></div>
  </div>

  <script type="module" src="js/personas.js"></script>
</body>

</html>
