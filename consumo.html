<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Consumo - Nobel School</title>
  <link rel="icon" href="logo.png" type="image/png">
  <script type="module" src="js/consumo.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="js/darkmode.js"></script>
  <script type="module" src="js/auth.js"></script>
</head>

<body class="bg-light">

  <nav id="main-navbar" class="navbar navbar-dark py-2">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center">
        <button id="btnVolver" class="btn btn-outline-light d-flex align-items-center me-3 px-3 py-1 shadow-sm"
          style="border-radius: 8px; font-weight: 500; border-width: 1.5px;">
          <i class="bi bi-arrow-left me-2"></i> Volver
        </button>
        <a class="navbar-brand d-flex align-items-center m-0 p-0 text-decoration-none" href="index.html">
          <img src="logo.png" alt="Logo Nobel School" width="45" height="45"
            class="rounded bg-white p-1 me-2 shadow-sm">
          <span class="fw-bold fs-4 mb-0 text-white" style="letter-spacing: 0.5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);">Nobel School</span>
        </a>
      </div>
      <div class="d-flex align-items-center bg-white rounded-pill p-1 pe-3 shadow-sm border border-light"
        style="cursor: default;">
        <div id="avatarFondo" class="rounded-circle d-flex align-items-center justify-content-center me-2 shadow-sm"
          style="width: 40px; height: 40px; background-color: #f8f9fa;">
          <span id="iconoGenero" class="fs-4" style="line-height: 1;">👤</span>
        </div>
        <div class="d-flex flex-column lh-1">
          <span id="nombrePersona" class="fw-bold text-dark text-truncate"
            style="max-width: 140px; font-size: 0.95rem;">Cargando...</span>
          <span id="etiquetaRol" class="text-muted mt-1"
            style="font-size: 0.7rem; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;">Rol</span>
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-4" style="max-width: 950px;">
    
    <div class="card shadow-sm border-0 mb-4 p-2">
      <div class="card-header bg-white border-bottom-0 pt-3 pb-0">
        <h5 class="card-title fw-bold text-primary mb-0">Registrar Nuevo Consumo (Lunes a Sábado)</h5>
      </div>
      <div class="card-body">
        <form id="formConsumo" class="row g-3">
          <div class="col-12">
            <label class="form-label text-dark fw-bold mb-1">Fecha</label>
            <input type="date" id="fechaConsumo" class="form-control" required>
          </div>
          <div class="col-8">
            <label class="form-label text-dark fw-bold mb-1">Producto consumido</label>
            <div class="dropdown">
              <input type="text" id="inputProducto" class="form-control form-control-lg" placeholder="Ej: Pan + Agua"
                autocomplete="off" required>
              <ul id="listaSugerencias" class="dropdown-menu w-100 shadow-sm"
                style="max-height: 200px; overflow-y: auto;"></ul>
            </div>
          </div>
          <div class="col-4">
            <label class="form-label text-dark fw-bold mb-1">Cant.</label>
            <input type="number" id="inputCantidad" class="form-control form-control-lg" value="1" min="1" required>
          </div>
          <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 fs-5">
              <i class="bi bi-plus-lg"></i> Agregar al carrito del día
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="card shadow-sm border-0 p-2 mb-4">
      <div class="card-header bg-white pt-3 pb-3 d-flex justify-content-between align-items-center border-bottom">
        <h5 class="mb-0 fw-bold text-dark">Historial de Consumos</h5>
        <div class="d-flex align-items-center">
          <button id="btnWhatsApp" class="btn btn-sm btn-success fw-bold me-2 shadow-sm"><i class="bi bi-whatsapp"></i> WhatsApp</button>
          <button id="btnExportarPDF" class="btn btn-sm btn-danger fw-bold me-3 shadow-sm"><i class="bi bi-file-earmark-pdf-fill"></i> PDF</button>
          <select id="mesFiltro" class="form-select form-select-sm border-primary text-primary fw-bold w-auto">
            <option value="todos">Todos los meses</option>
            <option value="0">Enero</option>
            <option value="1">Febrero</option>
            <option value="2">Marzo</option>
            <option value="3">Abril</option>
            <option value="4">Mayo</option>
            <option value="5">Junio</option>
            <option value="6">Julio</option>
            <option value="7">Agosto</option>
            <option value="8">Septiembre</option>
            <option value="9">Octubre</option>
            <option value="10">Noviembre</option>
            <option value="11">Diciembre</option>
          </select>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead class="table-primary" style="background-color: #dbeafe;">
              <tr>
                <th scope="col" class="ps-4 text-dark" style="width: 25%;">Día / Fecha</th>
                <th scope="col" class="text-dark" style="width: 50%;">Producto Consumido</th>
                <th scope="col" class="text-center text-dark" style="width: 15%;">Monto (S/)</th>
                <th scope="col" class="text-center text-dark" style="width: 10%;">Acción</th>
              </tr>
            </thead>
            <tbody id="tablaConsumos"></tbody>
            <tfoot class="border-top border-2" style="background-color: #f8f9fa;">
              <tr>
                <td colspan="2" class="text-end fw-bold fs-5 text-dark py-3">TOTAL DEL MES:</td>
                <td class="text-center fw-bold fs-5 text-success py-3" id="totalAcumulado">S/ 0.00</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0 mb-4" style="background-color: #e0f2fe; border-left: 5px solid #0284c7 !important;">
      <div class="card-body p-3">
        
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
          
          <div>
            <h6 id="tituloEstadoMes" class="mb-0 text-muted fw-bold" style="font-size: 0.85rem; letter-spacing: 0.5px;">ESTADO DE GESTIÓN: MES ACTUAL</h6>
            <div id="estadoCuentaMesVisual" class="mt-2">
              </div>
            <div id="estadoCuentaGlobalVisual" class="mt-1" style="display: none;"></div>
          </div>
          
          <div class="bg-white p-2 rounded-3 shadow-sm border" style="min-width: 320px;">
            <h6 class="fw-bold text-dark small mb-2 text-center"><i class="bi bi-wallet2 text-success me-1"></i> REGISTRAR NUEVO ABONO</h6>
            <div class="d-flex gap-2 mb-2">
              <input type="number" id="montoAbono" class="form-control form-control-sm border-primary fw-bold text-primary" placeholder="Monto S/" step="0.01" style="width: 40%;">
              <input type="date" id="fechaAbono" class="form-control form-control-sm text-muted" style="width: 60%;">
            </div>
            <div class="d-flex gap-2">
              <button type="button" id="btnAbonoYape" class="btn btn-sm text-white fw-bold w-50" style="background-color: #742384;"><i class="bi bi-qr-code me-1"></i> Yape</button>
              <button type="button" id="btnAbonoEfectivo" class="btn btn-sm btn-success fw-bold w-50"><i class="bi bi-cash-coin me-1"></i> Efectivo</button>
            </div>
          </div>

        </div>
        
        <div id="contenedorHistorialPagos" class="mt-3 pt-3 border-top border-info d-none">
          <h6 class="text-muted fw-bold mb-2" style="font-size: 0.8rem;"><i class="bi bi-clock-history"></i> HISTORIAL DE ABONOS EN ESTE MES:</h6>
          <ul id="listaPagosVisual" class="list-group list-group-flush rounded-1 bg-white"></ul>
        </div>

      </div>
    </div>

  </div>
</body>
</html>
