<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Consumo - Nobel School</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .btn-eliminar-img {
      padding: 0px 6px;
      font-size: 1.2rem;
      line-height: 1.2;
    }
  </style>
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <div>
        <button id="btnVolver" class="btn btn-outline-light me-3">
          <i class="bi bi-arrow-left-circle-fill me-1"></i> Volver
        </button>
        <a class="navbar-brand d-inline-flex align-items-center" href="index.html">
          <img src="logo.png.png" alt="Logo Nobel School" height="40" class="me-2 rounded bg-white p-1">
          Nobel School
        </a>
      </div>
      <div class="text-white fw-bold fs-5 text-end">
        <i class="bi bi-person-circle"></i> <span id="nombrePersona">Cargando...</span>
      </div>
    </div>
  </nav>

  <div class="container py-4" style="max-width: 800px;">
    
    <!-- Formulario de Registro con Cantidad -->
    <div class="card shadow-sm border-0 mb-4 p-2">
      <div class="card-header bg-white border-bottom-0 pt-3 pb-0">
        <h5 class="card-title fw-bold text-primary mb-0">Registrar Nuevo Consumo (Lunes a Sábado)</h5>
      </div>
      <div class="card-body">
        <form id="formConsumo" class="row g-3">
          
          <div class="col-12">
            <label class="form-label text-dark fw-bold mb-1">Fecha</label>
            <input type="date" id="fechaConsumo" class="form-control" required>
          </div>

          <!-- PRODUCTO Y CANTIDAD EN LA MISMA FILA -->
          <div class="col-8">
            <label class="form-label text-dark fw-bold mb-1">Producto consumido</label>
            <input type="text" id="inputProducto" class="form-control form-control-lg" list="sugerenciasProductos" placeholder="Escribe o selecciona..." autocomplete="off" required>
            <datalist id="sugerenciasProductos"></datalist>
          </div>

          <div class="col-4">
            <label class="form-label text-dark fw-bold mb-1">Cant.</label>
            <input type="number" id="inputCantidad" class="form-control form-control-lg" value="1" min="1" required>
          </div>

          <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 fs-5">
              <i class="bi bi-plus-lg"></i> Agregar al carrito del día
            </button>
          </div>

        </form>
      </div>
    </div>

    <!-- Tabla del Mes y Total -->
    <div class="card shadow-sm border-0 p-2">
      <div class="card-header bg-white pt-3 pb-3 d-flex justify-content-between align-items-center border-bottom">
        <h5 class="mb-0 fw-bold text-dark">Historial de Consumos</h5>
        
        <div class="d-flex align-items-center">
          <label for="mesFiltro" class="me-2 fw-bold text-muted mb-0">Ver Mes:</label>
          <select id="mesFiltro" class="form-select form-select-sm border-primary text-primary fw-bold w-auto">
            <option value="todos">Todos los meses</option>
            <option value="0">Enero</option>
            <option value="1">Febrero</option>
            <option value="2">Marzo</option>
            <option value="3">Abril</option>
            <option value="4">Mayo</option>
            <option value="5">Junio</option>
            <option value="6">Julio</option>
            <option value="7">Agosto</option>
            <option value="8">Septiembre</option>
            <option value="9">Octubre</option>
            <option value="10">Noviembre</option>
            <option value="11">Diciembre</option>
          </select>
        </div>
      </div>
      
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead class="table-primary" style="background-color: #dbeafe;">
              <tr>
                <th scope="col" class="ps-4 text-dark">Día / Fecha</th>
                <th scope="col" class="text-dark">Producto Consumido</th>
                <th scope="col" class="text-center text-dark">Monto (S/)</th>
                <th scope="col" class="text-center text-dark" style="width: 80px;">Acción</th>
              </tr>
            </thead>
            <tbody id="tablaConsumos">
              <!-- Registros inyectados por JS -->
            </tbody>
            <tfoot class="border-top border-2" style="background-color: #f8f9fa;">
              <tr>
                <td colspan="2" class="text-end fw-bold fs-5 text-dark py-3">TOTAL DEL MES:</td>
                <td class="text-center fw-bold fs-5 text-success py-3" id="totalAcumulado">S/ 0.00</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="js/consumo.js"></script>
</body>
</html>
