<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de consumos</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/darkmode.js"></script>
</head>

<body class="bg-body-tertiary d-flex align-items-center justify-content-center vh-100"
    style="background-color: #f4f7f6;">

    <div class="card shadow-lg border-0 rounded-4 bg-body anim-1"
        style="max-width: 950px; width: 95%; min-height: 550px;">
        <div class="row g-0 h-100">

            <!-- LADO IZQUIERDO: carga de imagen -->
            <div class="col-md-5 d-none d-md-block login-sidebar" style="background-image: url('icono.jpg');">
            </div>

            <!-- LADO DERECHO: formulario de registro -->
            <div class="col-md-7 p-4 p-sm-5 d-flex flex-column justify-content-center bg-body position-relative"
                style="border-radius: 1rem;">
                <div class="mb-5 anim-2 text-center">
                    <h3 class="fw-bold text-body-emphasis mb-2" style="font-size: 1.8rem;">Inicio de Sesión</h3>
                    <p class="text-muted small mb-0"><i class="bi bi-shield-lock-fill text-success me-1"></i> Conexión
                        segura y cifrada de extremo a extremo</p>
                </div>

                <form id="loginForm" class="px-md-3 anim-3">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted small text-uppercase"
                            style="letter-spacing: 0.5px;">CORREO ELECTRONICO</label>
                        <div class="input-group input-group-lg border rounded-3 overflow-hidden bg-body">
                            <span class="input-group-text border-0 text-secondary pe-1"><i
                                    class="bi bi-envelope-fill"></i></span>
                            <input type="email" id="email" class="form-control border-0 bg-transparent fs-6"
                                placeholder="administracion@nobelschool.edu.pe" required autocomplete="username">
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="form-label fw-bold text-muted small text-uppercase"
                            style="letter-spacing: 0.5px;">CONTRASEÑA</label>
                        <div class="input-group input-group-lg border rounded-3 overflow-hidden bg-body">
                            <span class="input-group-text border-0 text-secondary pe-1"><i
                                    class="bi bi-key-fill"></i></span>
                            <input type="password" id="password" class="form-control border-0 bg-transparent fs-6"
                                placeholder="Ingrese su contraseña " required autocomplete="current-password">
                        </div>
                    </div>

                    <button type="submit" id="btnLogin"
                        class="btn btn-primary btn-lg w-100 fw-bold shadow-sm btn-login d-flex justify-content-center align-items-center"
                        style="border-radius: 8px; padding: 14px 0;">
                        INGRESAR <i class="bi bi-box-arrow-in-right ms-2 fs-5"></i>
                    </button>

                    <div id="loginError"
                        class="alert alert-danger d-none text-center small fw-bold py-2 mt-3 border-0 shadow-sm rounded-3">
                    </div>
                </form>

                <div class="mt-auto pt-4 text-center anim-4">
                    <p class="text-muted mb-0" style="font-size: 0.75rem;">&copy; 2026 Quiosco Nobel School. Todos los
                        derechos reservados.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuXHMvdHZbJLoo-SakENFEcUvlECJvTRA",
            authDomain: "quiosco-nobel-school.firebaseapp.com",
            projectId: "quiosco-nobel-school",
            storageBucket: "quiosco-nobel-school.firebasestorage.app",
            messagingSenderId: "448413136914",
            appId: "1:448413136914:web:426e8fc48a8e24ea96c0cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const btnLogin = document.getElementById('btnLogin');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            btnLogin.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Verificando credenciales...';
            btnLogin.disabled = true;
            loginError.classList.add('d-none');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.replace("index.html");
            } catch (error) {
                loginError.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-1"></i> Credenciales inválidas. Verifique su correo y contraseña.';
                loginError.classList.remove('d-none');

                btnLogin.innerHTML = 'Autorizar Ingreso <i class="bi bi-box-arrow-in-right ms-2 fs-5"></i>';
                btnLogin.disabled = false;
            }
        });
    </script>
</body>

</html>
