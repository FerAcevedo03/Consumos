<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alumnos - Nobel School</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-alumnos" data-tipo="alumnos">

  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #ffc107;">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand d-inline-flex align-items-center text-dark fw-bold" href="index.html">
        <img src="logo.png.png" alt="Logo Nobel School" height="40" class="me-2 rounded bg-white p-1">
        Nobel School
      </a>
      <a href="index.html" class="btn btn-outline-dark"><i class="bi bi-house-door-fill me-1"></i> Inicio</a>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="text-center text-warning mb-4 fw-bold" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.1);"><i class="bi bi-mortarboard-fill"></i> Lista de Alumnos</h2>

    <!-- Contenedor de Agregar y Buscar -->
    <div class="row mb-4 align-items-center">
      <!-- Agregar -->
      <div class="col-md-6 mb-3 mb-md-0">
        <div class="input-group shadow-sm">
          <input type="text" id="nuevoNombre" class="form-control border-warning" placeholder="Nombre completo...">
          <button id="btnAgregar" class="btn btn-warning text-dark fw-bold">➕ Añadir</button>
        </div>
      </div>
      <!-- Buscar -->
      <div class="col-md-6">
        <div class="input-group shadow-sm">
          <span class="input-group-text bg-white text-muted border-end-0">
            <i class="bi bi-search"></i>
          </span>
          <input type="text" id="buscadorNombres" class="form-control border-start-0" placeholder="Buscar alumno por nombre...">
        </div>
      </div>
    </div>

    <!-- Contenedor donde se generan las tarjetas -->
    <div id="listaPersonas" class="row g-3"></div>
  </div>

  <script src="js/personas.js"></script>
</body>
</html>
