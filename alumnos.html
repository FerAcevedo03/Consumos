<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Consumo - Nobel School</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/darkmode.js"></script>
</head>

<body class="bg-alumnos" data-tipo="alumnos">

  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #ffc107;">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand d-inline-flex align-items-center text-dark fw-bold" href="index.html">
        <img src="logo.png" alt="Logo Nobel School" height="40" class="me-2 rounded bg-white p-1 shadow-sm">
        Nobel School
      </a>
      <a href="index.html" class="btn btn-dark" style="border-radius: 8px;"><i class="bi bi-house-door-fill me-1"></i> Inicio</a>
    </div>
  </nav>

  <div class="container py-4">
    <div class="text-center mb-4">
      <h2 class="text-dark fw-bold" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.05);">
        <i class="bi bi-mortarboard-fill text-warning me-2"></i> Lista de Alumnos
      </h2>
    </div>

    <div class="card shadow-sm border-0 rounded-4 p-3 mb-4 bg-white">
      <div class="row g-3 justify-content-center align-items-center">
        <div class="col-md-6">
          <div class="input-group input-group-lg shadow-sm">
            <span class="input-group-text bg-light border-warning border-end-0"><i class="bi bi-person-plus-fill text-muted"></i></span>
            <input type="text" id="nuevoNombre" class="form-control border-warning border-start-0 ps-0" placeholder="Nombre completo...">
            <button id="btnAgregar" class="btn btn-warning text-dark fw-bold px-4">➕ Añadir</button>
          </div>
        </div>
        <div class="col-md-6">
          <div class="input-group input-group-lg shadow-sm">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" id="buscadorNombres" class="form-control border-start-0 ps-0" placeholder="Buscar alumno por nombre...">
          </div>
        </div>
      </div>
    </div>

    <div id="listaPersonas" class="row g-3">
        <div class="col-12 text-center text-muted py-5">
            <div class="spinner-border text-warning mb-2" role="status"></div>
            <p>Cargando lista desde la nube...</p>
        </div>
    </div>
  </div>

  <script type="module" src="js/personas.js"></script>
</body>

</html>
