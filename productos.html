<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Nobel School</title>
  <!-- Bootstrap y Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

  <!-- Navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-info shadow">
    <div class="container">
      <a class="navbar-brand text-dark fw-bold d-flex align-items-center" href="index.html">
        <i class="bi bi-box-seam-fill me-2 fs-4"></i> Inventario de Productos
      </a>
      <a href="index.html" class="btn btn-outline-dark">⬅ Inicio</a>
    </div>
  </nav>

  <div class="container py-4">
    <!-- Formulario para agregar producto -->
    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3 fw-bold text-info-emphasis">Agregar Nuevo Producto</h5>
        <form id="formProducto" class="row g-3 align-items-center">
          <div class="col-md-4">
            <input type="text" id="prodNombre" class="form-control" placeholder="Nombre del producto" required>
          </div>
          <div class="col-md-3">
            <div class="input-group">
              <span class="input-group-text bg-light">S/</span>
              <input type="number" id="prodPrecio" class="form-control" placeholder="Precio" step="0.10" min="0" required>
            </div>
          </div>
          <div class="col-md-3">
            <input type="url" id="prodImagen" class="form-control" placeholder="URL de imagen (opcional)">
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-info w-100 text-dark fw-bold">Guardar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Buscador y Título -->
    <div class="row mb-3 align-items-center mt-4">
      <div class="col-md-6">
        <h4 class="mb-0 text-dark fw-bold">Lista de Productos</h4>
      </div>
      <div class="col-md-6">
        <div class="input-group shadow-sm">
          <span class="input-group-text bg-white border-end-0 text-muted">
            <i class="bi bi-search"></i>
          </span>
          <input type="text" id="buscadorProductos" class="form-control border-start-0 ps-0" placeholder="Buscar producto por nombre...">
        </div>
      </div>
    </div>

    <!-- Tabla de Productos -->
    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-info">
              <tr>
                <th scope="col" class="text-center" style="width: 80px;">Img</th>
                <th scope="col">Producto</th>
                <th scope="col">Precio (S/)</th>
                <th scope="col" class="text-end pe-4">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaProductos">
              <!-- Las filas de productos se generarán aquí con JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Archivo de Lógica -->
  <script src="js/productos.js"></script>
</body>
</html>
