<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Nobel School</title>
  <link rel="icon" href="logo.png" type="image/png">
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/darkmode.js"></script>
  <script type="module" src="js/auth.js"></script>
</head>
<body class="bg-light">

  <nav id="main-navbar" class="navbar navbar-dark py-2 px-1 px-md-0 shadow-sm" style="background: linear-gradient(90deg, #0d6efd 0%, #0284c7 100%);">
    <div class="container-fluid container-md d-flex justify-content-between align-items-center">
      
      <div class="d-flex justify-content-start" style="width: 25%;">
        <a href="index.html" class="btn btn-outline-light d-flex align-items-center px-2 px-sm-3 py-1 shadow-sm text-decoration-none" style="border-radius: 8px; font-weight: 500; border-width: 1.5px;">
          <i class="bi bi-arrow-left"></i> 
          <span class="ms-2 d-none d-sm-inline">Volver</span>
        </a>
      </div>

      <div class="d-flex justify-content-center" style="width: 50%;">
        <div class="d-flex align-items-center bg-white rounded-pill p-1 pe-2 pe-sm-3 shadow-sm border border-light" style="cursor: default; max-width: 100%; white-space: nowrap;">
          <button id="theme-toggle" class="btn btn-sm btn-outline-secondary rounded-circle me-1 me-sm-2 d-flex align-items-center justify-content-center border-0 flex-shrink-0" style="width: 32px; height: 32px;">
            <i id="theme-icon" class="bi bi-moon-fill" style="font-size: 0.9rem;"></i>
          </button>
          <div class="rounded-circle d-flex align-items-center justify-content-center me-1 me-sm-2 shadow-sm flex-shrink-0" style="width: 32px; height: 32px; background-color: #0dcaf0;">
            <span class="fs-6 text-dark" style="line-height: 1;"><i class="bi bi-box-seam-fill"></i></span>
          </div>
          <div class="d-flex flex-column lh-1 text-start text-truncate">
            <span class="fw-bold text-dark text-truncate" style="font-size: 0.85rem; max-width: 100px;">Inventario</span>
            <span class="text-muted mt-1" style="font-size: 0.65rem; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;">Catálogo</span>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end align-items-center" style="width: 25%;">
        <a class="navbar-brand d-flex align-items-center m-0 p-0 text-decoration-none" href="index.html">
          <span class="fw-bold fs-4 mb-0 text-white me-2 d-none d-md-block" style="letter-spacing: 0.5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);">Nobel School</span>
          <img src="logo.png" alt="Logo Nobel School" width="38" height="38" class="rounded bg-white p-1 shadow-sm">
        </a>
      </div>

    </div>
  </nav>

  <div class="container py-4">
    <div class="text-center mb-5">
      <h2 class="text-dark fw-bold" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.05);">
        <i class="bi bi-box-seam-fill text-info me-2"></i> Inventario de Productos
      </h2>
    </div>

    <div class="row mb-5 justify-content-between align-items-center g-3">
      <div class="col-12 col-md-8">
        <div class="input-group input-group-lg rounded-pill shadow-sm border overflow-hidden" style="background-color: var(--bs-body-bg);">
          <span class="input-group-text bg-transparent border-0 text-muted ps-4"><i class="bi bi-search"></i></span>
          <input type="text" id="buscadorProductos" class="form-control border-0 bg-transparent shadow-none" placeholder="Buscar por nombre de producto...">
        </div>
      </div>
      <div class="col-12 col-md-4 text-md-end text-center">
        <button id="btnAgregarModal" class="btn btn-info btn-lg fw-bold rounded-pill shadow-sm px-4 text-dark w-100 w-md-auto">
          <i class="bi bi-plus-circle-fill me-2"></i> Añadir Producto
        </button>
      </div>
    </div>

    <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-info">
              <tr>
                <th scope="col" class="text-center ps-4" style="width: 80px;">Tipo</th>
                <th scope="col">Nombre</th>
                <th scope="col">Precio (S/)</th>
                <th scope="col" class="text-end pe-4">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaProductos">
              <tr><td colspan="4" class="text-center text-muted py-5"><div class="spinner-border text-info mb-2" role="status"></div><br>Cargando inventario de la nube...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/productos.js"></script>
</body>
</html>
