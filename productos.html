<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Nobel School</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-light">

  <nav class="navbar navbar-dark shadow-sm py-2" style="background-color: #00bcd4;">
    <div class="container d-flex justify-content-between align-items-center">
      <span class="navbar-brand d-flex align-items-center m-0 p-0 fw-bold fs-4 text-white">
        <i class="bi bi-box-seam-fill me-2 fs-3"></i> Inventario de Productos y Comidas
      </span>
      <a href="index.html" class="btn btn-outline-light d-flex align-items-center px-3 py-1"
        style="border-radius: 8px; font-weight: 500;">
        <i class="bi bi-arrow-left me-2"></i> Inicio
      </a>
    </div>
  </nav>

  <div class="container py-4" style="max-width: 1000px;">

    <div class="card shadow-sm border-0 mb-4 p-2">
      <div class="card-body">
        <h5 class="fw-bold text-dark mb-3" id="tituloFormulario">Agregar Nuevo Producto o Comida</h5>
        <form id="formProducto" class="row g-3 align-items-center">
          <div class="col-md-5">
            <input type="text" id="nombreProducto" class="form-control form-control-lg"
              placeholder="Ej: Arroz con pollo, Galleta..." autocomplete="off" required>
          </div>
          <div class="col-md-3">
            <div class="input-group input-group-lg">
              <span class="input-group-text bg-white">S/</span>
              <input type="number" id="precioProducto" class="form-control" placeholder="Precio" step="0.10" min="0"
                required>
            </div>
          </div>
          <div class="col-md-2">
            <select id="categoriaProducto" class="form-select form-select-lg" required>
              <option value="" disabled selected>Categoría...</option>
              <option value="menu">Menú / Comida</option>
              <option value="bebida">Bebida</option>
              <option value="snack">Snack / Postre</option>
            </select>
          </div>
          <div class="col-md-2">
            <button type="submit" id="btnGuardar" class="btn text-white w-100 fw-bold py-2 fs-5"
              style="background-color: #00bcd4;">
              Guardar
            </button>
            <button type="button" id="btnCancelarEdicion" class="btn btn-secondary w-100 fw-bold py-1 mt-1 d-none">
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-end mb-3 border-bottom pb-2">
      <h4 class="fw-bold text-dark mb-0">Lista del Inventario</h4>
      <div class="input-group w-50 shadow-sm">
        <span class="input-group-text bg-white text-muted"><i class="bi bi-search"></i></span>
        <input type="text" id="buscadorProductos" class="form-control" placeholder="Buscar por nombre...">
      </div>
    </div>

    <div class="card shadow-sm border-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead style="background-color: #e0f7fa;">
            <tr>
              <th scope="col" class="text-center" style="width: 10%;">Tipo</th>
              <th scope="col" style="width: 50%;">Nombre</th>
              <th scope="col" style="width: 20%;">Precio (S/)</th>
              <th scope="col" class="text-center" style="width: 20%;">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaInventario">
            <tr>
              <td colspan="4" class="text-center text-muted py-4">Cargando inventario...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script type="module" src="js/productos.js"></script>
</body>

</html>
