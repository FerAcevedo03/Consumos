<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Nobel School</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="CSS/styles.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-info shadow">
    <div class="container">
      <a class="navbar-brand text-dark fw-bold d-flex align-items-center" href="index.html">
        <i class="bi bi-box-seam-fill me-2 fs-4"></i> Inventario de Productos y Comidas
      </a>
      <a href="index.html" class="btn btn-outline-dark">⬅ Inicio</a>
    </div>
  </nav>

  <div class="container py-4">
    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3 fw-bold text-info-emphasis" id="tituloFormulario">Agregar Nuevo Producto o Comida</h5>
        <form id="formProducto" class="row g-3 align-items-center">
          
          <div class="col-md-4">
            <input type="text" id="prodNombre" class="form-control" placeholder="Ej: Arroz con pollo, Galleta..." required autocomplete="off">
          </div>
          
          <div class="col-md-3">
            <div class="input-group">
              <span class="input-group-text bg-light">S/</span>
              <input type="number" id="prodPrecio" class="form-control" placeholder="Precio" step="0.10" min="0" required>
            </div>
          </div>
          
          <div class="col-md-3">
            <select id="prodCategoria" class="form-select" required>
              <option value="" selected disabled>Categoría...</option>
              <option value="comida">🍛 Comida (Menú)</option>
              <option value="bebida">🥤 Bebidas</option>
              <option value="pan">🥖 Pan / Sándwich</option>
              <option value="galleta">🍪 Galletas</option>
              <option value="keke">🧁 Kekes / Porciones</option>
              <option value="postre">🍮 Postres</option>
              <option value="dulce">🍬 Dulces / Golosinas</option>
              <option value="snack">🍟 Snacks / Chifles</option>
              <option value="utiles">✏️ Útiles (Lápices, etc)</option>
              <option value="otro">📦 Otro</option>
            </select>
          </div>
          
          <div class="col-md-2">
            <button type="submit" id="btnGuardar" class="btn btn-info w-100 text-dark fw-bold">Guardar</button>
            <button type="button" id="btnCancelarEdicion" class="btn btn-secondary w-100 fw-bold mt-1 d-none">Cancelar</button>
          </div>
          
        </form>
      </div>
    </div>

    <div class="row mb-3 align-items-center mt-4">
      <div class="col-md-6">
        <h4 class="mb-0 text-dark fw-bold">Lista del Inventario</h4>
      </div>
      <div class="col-md-6">
        <div class="input-group shadow-sm">
          <span class="input-group-text bg-white border-end-0 text-muted">
            <i class="bi bi-search"></i>
          </span>
          <input type="text" id="buscadorProductos" class="form-control border-start-0 ps-0" placeholder="Buscar por nombre...">
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-info">
              <tr>
                <th scope="col" class="text-center" style="width: 80px;">Tipo</th>
                <th scope="col">Nombre</th>
                <th scope="col">Precio (S/)</th>
                <th scope="col" class="text-end pe-4">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaProductos">
              <tr><td colspan="4" class="text-center text-muted py-4">Cargando inventario de la nube...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="JS/productos.js"></script>
</body>
</html>
