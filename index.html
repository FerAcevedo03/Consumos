<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nobel School - Menú Principal</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <!-- Reemplaza "logo.png" con la ruta de tu logo -->
        <i class="bi bi-shield-lock-fill fs-2 me-2"></i> 
        <span class="fs-4 fw-bold">Nobel School</span>
      </a>
    </div>
  </nav>

  <!-- Banner de Bienvenida -->
  <div class="container mt-5">
    <div class="p-5 text-center bg-white rounded-4 shadow-sm border-top border-primary border-5">
      <h1 class="display-5 fw-bold text-dark">SISTEMA DE CONTROL DE CONSUMO</h1>
    </div>
  </div>

  <!-- Tarjetas del Menú -->
  <div class="container mt-5 mb-5">
    <div class="row g-4 text-center">
      
      <!-- Tarjeta Profesores -->
      <div class="col-md-3">
        <a href="profesores.html" class="text-decoration-none">
          <div class="card h-100 shadow-sm border-0 menu-card rounded-4">
            <div class="card-body p-4">
              <div class="display-4 text-primary mb-3"><i class="bi bi-person-video3"></i></div>
              <h4 class="card-title fw-bold text-dark">Profesores</h4>
              <p class="text-muted small">Registro y consumos del personal docente</p>
            </div>
          </div>
        </a>
      </div>

      <!-- Tarjeta Administrativos -->
      <div class="col-md-3">
        <a href="administrativos.html" class="text-decoration-none">
          <div class="card h-100 shadow-sm border-0 menu-card rounded-4">
            <div class="card-body p-4">
              <div class="display-4 text-success mb-3"><i class="bi bi-person-badge"></i></div>
              <h4 class="card-title fw-bold text-dark">Administrativos</h4>
              <p class="text-muted small">Gestión de cuentas del personal administrativo</p>
            </div>
          </div>
        </a>
      </div>

      <!-- Tarjeta Alumnos -->
      <div class="col-md-3">
        <a href="alumnos.html" class="text-decoration-none">
          <div class="card h-100 shadow-sm border-0 menu-card rounded-4">
            <div class="card-body p-4">
              <div class="display-4 text-warning mb-3"><i class="bi bi-mortarboard-fill"></i></div>
              <h4 class="card-title fw-bold text-dark">Alumnos</h4>
              <p class="text-muted small">Gestion de consumo de alimentos de los alumnos</p>
            </div>
          </div>
        </a>
      </div>

      <!-- Tarjeta Productos -->
      <div class="col-md-3">
        <a href="productos.html" class="text-decoration-none">
          <div class="card h-100 shadow-sm border-0 menu-card rounded-4">
            <div class="card-body p-4">
              <div class="display-4 text-info mb-3"><i class="bi bi-box-seam-fill"></i></div>
              <h4 class="card-title fw-bold text-dark">Productos</h4>
              <p class="text-muted small">Base de datos de precios e inventario</p>
            </div>
          </div>
        </a>
      </div>

    </div>
  </div>

</body>
</html>
