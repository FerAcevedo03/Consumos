<!DOCTYPE html>
<html lang="es">
<head>

  <title>Registro de Consumo - Nobel School</title>
  <link rel="icon" href="logo.png" type="image/png">
  
  <!-- ENLACE PARA CONVERTIR EN APP MÓVIL (PWA) -->
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
  <!-- SEGURIDAD Y MODO OSCURO -->
  <script type="module" src="js/auth.js"></script>
  <script src="js/darkmode.js"></script>
</head>

<body class="bg-body-tertiary">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand d-flex align-items-center" href="#">

      </a>

      <!-- CONTENEDOR DE BOTONES (SALIR Y MODO OSCURO) -->
      <div class="d-flex align-items-center">
        <button onclick="cerrarSesion()" class="btn btn-danger shadow-sm me-2 fw-bold" style="border-radius: 8px;" title="Cerrar Sesión">
          <i class="bi bi-box-arrow-right"></i> Salir
        </button>
        <button id="btnDarkMode" class="btn btn-primary border-light shadow-sm" style="border-radius: 8px;">
          <i class="bi bi-moon-fill"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="container mt-5">

      <h1 class="display-5 fw-bold text-body-emphasis">SISTEMA DE CONTROL DE CONSUMO</h1>

  </div>

  <div class="container mt-5 mb-5">
    <div class="row g-4 text-center">
      
      <div class="col-md-3">
        <a href="profesores.html" class="text-decoration-none">
          <div class="card h-100 shadow-sm border-0 menu-card rounded-4 bg-body">
            <div class="card-body p-4">
              <div class="display-4 text-primary mb-3"><i class="bi bi-person-video3"></i></div>
              <h4 class="card-title fw-bold text-body-emphasis">Profesores</h4>
              <p class="text-muted small">Registro y consumos del personal docente</p>
            </div>
          </div>
        </a>
      </div>

      <div class="col-md-3">
        <a href="administrativos.html" class="text-decoration-none">

              <div class="display-4 text-success mb-3"><i class="bi bi-person-badge"></i></div>
              <h4 class="card-title fw-bold text-body-emphasis">Administrativos</h4>
              <p class="text-muted small">Gestión de cuentas del personal administrativo</p>
            </div>

        </a>

              <p class="text-muted small">Gestión de consumo de alimentos de los alumnos</p>
            </div>
          </div>
        </a>
      </div>

      <div class="col-md-3">
        <a href="productos.html" class="text-decoration-none">
          <div class="card h-100 shadow-sm border-0 menu-card rounded-4 bg-body">
            <div class="card-body p-4">

            </div>
          </div>
        </a>
